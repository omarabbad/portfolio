<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omar Abbad | Artificial Intelligence Developer</title>
    <meta name="description" content="Professional portfolio of Omar Abbad, Artificial Intelligence Developer." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Prevent flash of light mode: apply dark class before first paint -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        if (stored === 'light') return;
        document.documentElement.classList.add('dark');
      })();
    </script>
    <style>
      /* Prevent FOUC */
      body { background-color: #0A0A0A; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
